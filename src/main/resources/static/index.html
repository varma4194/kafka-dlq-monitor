<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka DLQ Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #357abd;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2a2a3e;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #4a9eff;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #4a9eff;
        }

        .stat-card.retried {
            border-left-color: #50c878;
        }

        .stat-card.retried .stat-value {
            color: #50c878;
        }

        .stat-card.discarded {
            border-left-color: #ff6b6b;
        }

        .stat-card.discarded .stat-value {
            color: #ff6b6b;
        }

        .messages-section {
            background: #2a2a3e;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead tr {
            border-bottom: 2px solid #404050;
        }

        th {
            text-align: left;
            padding: 15px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            font-size: 12px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #383848;
        }

        tbody tr:hover {
            background: #323246;
        }

        .topic {
            color: #4a9eff;
            font-weight: 500;
        }

        .timestamp {
            color: #999;
            font-size: 13px;
        }

        .payload-preview {
            color: #ccc;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #4a9eff20;
            color: #4a9eff;
        }

        .status-retried {
            background: #50c87820;
            color: #50c878;
        }

        .status-discarded {
            background: #ff6b6b20;
            color: #ff6b6b;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-retry {
            background: #50c878;
            color: white;
        }

        .btn-retry:hover {
            background: #3a9a5f;
        }

        .btn-retry:disabled {
            background: #2a5a3f;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-discard {
            background: #ff6b6b;
            color: white;
        }

        .btn-discard:hover {
            background: #e05555;
        }

        .btn-discard:disabled {
            background: #8a3a3a;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .error {
            background: #ff6b6b20;
            color: #ff6b6b;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .btn-small {
                padding: 4px 8px;
                font-size: 11px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kafka DLQ Monitor</h1>
            <button class="refresh-btn" id="refreshBtn">Refresh Now</button>
        </header>

        <div class="error" id="error"></div>

        <div class="stats" id="stats"></div>

        <div class="messages-section">
            <div id="loading" class="loading" style="display: none;">Loading messages...</div>
            <table id="messagesTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Topic</th>
                        <th>Partition / Offset</th>
                        <th>Timestamp</th>
                        <th>Payload (Preview)</th>
                        <th>Error</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">✓</div>
                <p>No dead letter messages found</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/messages';
        const REFRESH_INTERVAL = 10000; // 10 seconds
        let refreshTimer;

        async function loadMessages() {
            try {
                showLoading(true);
                clearError();

                const resp = await fetch(API_BASE);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const messages = await resp.json();
                renderMessages(messages);
                await loadStats();
            } catch (err) {
                showError(`Failed to load messages: ${err.message}`);
            } finally {
                showLoading(false);
            }
        }

        async function loadStats() {
            try {
                const resp = await fetch(`${API_BASE}/stats`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const stats = await resp.json();
                renderStats(stats);
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        function renderStats(stats) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Messages</div>
                    <div class="stat-value">${stats.total || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending</div>
                    <div class="stat-value">${stats.pending || 0}</div>
                </div>
                <div class="stat-card retried">
                    <div class="stat-label">Retried</div>
                    <div class="stat-value">${stats.retried || 0}</div>
                </div>
                <div class="stat-card discarded">
                    <div class="stat-label">Discarded</div>
                    <div class="stat-value">${stats.discarded || 0}</div>
                </div>
            `;
        }

        function renderMessages(messages) {
            const table = document.getElementById('messagesTable');
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (!messages || messages.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';

            tbody.innerHTML = messages.map(msg => `
                <tr>
                    <td><span class="topic">${escapeHtml(msg.originalTopic)}</span></td>
                    <td>${msg.partition} / ${msg.offset}</td>
                    <td><span class="timestamp">${formatTime(msg.receivedAt)}</span></td>
                    <td><span class="payload-preview" title="${escapeHtml(msg.payload)}">${escapeHtml(truncate(msg.payload, 60))}</span></td>
                    <td><span class="payload-preview" title="${escapeHtml(msg.errorMessage)}">${escapeHtml(truncate(msg.errorMessage, 40))}</span></td>
                    <td><span class="status-badge status-${msg.status.toLowerCase()}">${msg.status}</span></td>
                    <td>
                        <div class="actions">
                            <button class="btn-small btn-retry" onclick="retryMessage('${msg.id}')" ${msg.status !== 'PENDING' ? 'disabled' : ''}>Retry</button>
                            <button class="btn-small btn-discard" onclick="discardMessage('${msg.id}')" ${msg.status !== 'PENDING' ? 'disabled' : ''}>Discard</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function retryMessage(id) {
            if (!confirm('Retry this message?')) return;

            try {
                const resp = await fetch(`${API_BASE}/${id}/retry`, { method: 'POST' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                loadMessages();
            } catch (err) {
                showError(`Failed to retry message: ${err.message}`);
            }
        }

        async function discardMessage(id) {
            if (!confirm('Discard this message?')) return;

            try {
                const resp = await fetch(`${API_BASE}/${id}/discard`, { method: 'POST' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                loadMessages();
            } catch (err) {
                showError(`Failed to discard message: ${err.message}`);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(msg) {
            const errDiv = document.getElementById('error');
            errDiv.textContent = msg;
            errDiv.classList.add('show');
        }

        function clearError() {
            const errDiv = document.getElementById('error');
            errDiv.textContent = '';
            errDiv.classList.remove('show');
        }

        function truncate(str, len) {
            if (!str) return '';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoStr) {
            if (!isoStr) return '-';
            try {
                const date = new Date(isoStr);
                return date.toLocaleString();
            } catch {
                return isoStr;
            }
        }

        function startAutoRefresh() {
            clearInterval(refreshTimer);
            refreshTimer = setInterval(loadMessages, REFRESH_INTERVAL);
        }

        document.getElementById('refreshBtn').addEventListener('click', loadMessages);

        loadMessages();
        startAutoRefresh();
    </script>
</body>
</html>
